services:
  postgres:
    image: postgres:15
    container_name: workshop-db
    environment:
      POSTGRES_DB:       workshop
      POSTGRES_USER:     workshop
      POSTGRES_PASSWORD: workshop
    ports:
      - "5432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workshop -d workshop"]
      interval: 5s
      timeout: 3s
      retries: 5
