services:
  postgres:
    image: postgres:16
    container_name: binastar-starter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: binastar-starter
      POSTGRES_USER: binastar-starter
      POSTGRES_PASSWORD: binastar-starter
    ports:
      - "5432:5432"
    volumes:
      # Bind-Mount: DB-Daten liegen im Projektordner (per .gitignore ausgeschlossen),
      # nicht im globalen Docker-Volume-Store.
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U binastar-starter -d binastar-starter"]
      interval: 5s
      timeout: 5s
      retries: 5
